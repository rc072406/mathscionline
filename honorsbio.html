<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathscionline | Honors Biology</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-purple: #6450BB;
            --override-accent-color: #655dc6;
            --color-text: #000;
            
            /* Modernized font stack using the Inter web font */
            --font-regular: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-medium: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-bold: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            
            --header-height: 96px;
            --gutter: 30px;
        }

        body {
            margin: 0;
            font-family: var(--font-regular);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Ensures crisp text rendering on Safari/Mac */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            height: var(--header-height);
            border-bottom: 1px solid #eee;
            position: relative;
            padding: 0 60px;
            background: #fff;
            z-index: 1001;
        }

        .logo {
            position: absolute;
            left: var(--gutter);
            font-family: var(--font-bold);
            font-weight: 700;
            font-size: 28px; /* Consistent 28px size */
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .logo a {
            text-decoration: none;
            color: inherit;
        }

        /* Global Menu Toggle */
        .menu-toggle {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1100;
            position: absolute;
            right: var(--gutter);
        }

        .menu-toggle span {
            width: 30px;
            height: 3px;
            background: var(--color-text);
            transition: 0.3s;
        }

        /* Full-screen Nav Menu with Ombre Effect */
        .nav-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #ffffff, #e8e4f5, #beb4e6, #e8e4f5, #ffffff);
            background-size: 100% 400%;
            animation: ombreUpDown 8s ease-in-out infinite;
            
            display: flex;
            list-style: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
            margin: 0;
            padding: 0;
            padding-top: 120px;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.77,0.2,0.05,1.0);
            z-index: 1050;
            overflow-y: auto;
        }

        .nav-menu.active {
            transform: translateX(0);
        }

        .nav-item {
            width: 100%;
            text-align: center;
            padding: 0;
            position: relative;
        }

        .nav-link {
            text-decoration: none;
            color: var(--color-text);
            font-family: var(--font-bold);
            font-weight: 700;
            font-size: 22px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            cursor: pointer;
            display: block;
            margin-bottom: 10px;
        }

        .nav-link:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px; 
            height: 2px;
            background-color: var(--override-accent-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-link.active:after {
            opacity: 1;
        }

        .nav-item:hover .nav-link:after {
            opacity: 0.35; 
        }

        /* Hero Section */
        .hero {
            flex: 1;
            height: 60vh;
            background: linear-gradient(180deg, #ffffff, #e8e4f5, #beb4e6, #e8e4f5, #ffffff);
            background-size: 100% 400%;
            animation: ombreUpDown 8s ease-in-out infinite;
            will-change: background-position;
            display: flex;
            align-items: flex-start;
            padding: 80px var(--gutter);
        }

        @keyframes ombreUpDown {
            0% { background-position: 50% 0%; }
            50% { background-position: 50% 100%; }
            100% { background-position: 50% 0%; }
        }

        .hero-content h1 {
            font-family: var(--font-bold);
            font-weight: 700;
            font-size: 32px;
            max-width: 100%;
            margin: 0;
            letter-spacing: -0.02em;
        }

        footer {
            padding: 40px var(--gutter);
            border-top: 1px solid #eee;
            background-color: #fff;
            text-align: center;
        }

        .copyright {
            font-family: var(--font-regular);
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Hamburger Animation States */
        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -7px); }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html">MATHSCIONLINE</a>
        </div>
        
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="apbio.html" class="nav-link">Ap Biology</a>
            </li>
            <li class="nav-item">
                <a href="honorsbio.html" class="nav-link active">Honors Biology</a>
            </li>
            <li class="nav-item">
                <a href="about.html" class="nav-link">About Me</a>
            </li>
            <li class="nav-item">
                <a href="contact.html" class="nav-link">Contact</a>
            </li>
            <li class="nav-item">
                <a href="testimonials.html" class="nav-link">Testimonials</a>
            </li>
            <li class="nav-item">
                <a href="regis.html" class="nav-link">Registration</a>
            </li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Honors Biology with Mrs. Heapy.</h1>
        </div>
    </section>

    <footer>
        <div class="copyright">
            &copy; 2026 MATHSCIONLINE. All Rights Reserved.
        </div>
    </footer>

    <script>
        const menuToggle = document.getElementById('mobile-menu');
        const navMenu = document.querySelector('.nav-menu');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navMenu.classList.toggle('active');
            
            if (navMenu.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        });
    </script>

</body>
</html>
