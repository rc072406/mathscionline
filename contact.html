<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathscionline | Contact</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-purple: #6450BB;
            --override-accent-color: #655dc6;
            --color-text: #000;
            
            /* Modernized font stack using the Inter web font */
            --font-regular: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-medium: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-bold: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            
            --header-height: 96px;
            --gutter: 30px;
        }

        body {
            margin: 0;
            font-family: var(--font-regular);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Ensures crisp text rendering on Safari/Mac */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            height: var(--header-height);
            border-bottom: 1px solid #eee;
            position: relative;
            padding: 0 60px;
            background: #fff;
            z-index: 1001;
        }

        .logo {
            position: absolute;
            left: var(--gutter);
            font-family: var(--font-bold);
            font-weight: 700;
            font-size: 28px; /* Updated for consistency */
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .logo a {
            text-decoration: none;
            color: inherit;
        }

        /* Unified Menu Toggle */
        .menu-toggle {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1100;
            position: absolute;
            right: var(--gutter);
        }

        .menu-toggle span {
            width: 30px;
            height: 3px;
            background: var(--color-text);
            transition: 0.3s;
        }

        /* Full-screen Nav Menu with Ombre Effect */
        .nav-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #ffffff, #e8e4f5, #beb4e6, #e8e4f5, #ffffff);
            background-size: 100% 400%;
            animation: ombreUpDown 8s ease-in-out infinite;
            
            display: flex;
            list-style: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
            margin: 0;
            padding: 0;
            padding-top: 120px;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.77,0.2,0.05,1.0);
            z-index: 1050;
            overflow-y: auto;
        }

        .nav-menu.active {
            transform: translateX(0);
        }

        .nav-item {
            width: 100%;
            text-align: center;
            padding: 0;
            position: relative;
        }

        .nav-link {
            text-decoration: none;
            color: var(--color-text);
            font-family: var(--font-bold);
            font-weight: 700;
            font-size: 22px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            cursor: pointer;
            display: block;
            margin-bottom: 10px;
        }

        /* --- ADDED DROPDOWN STYLES --- */
        .dropdown-content {
            display: block;
            position: static;
            transform: none;
            min-width: unset;
            box-shadow: none;
            padding: 10px 0 20px 0;
            background: transparent;
            border: none;
        }

        .dropdown-column {
            margin-bottom: 15px;
        }

        .column-title {
            color: var(--override-accent-color);
            font-family: var(--font-bold);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 10px;
            display: block;
            opacity: 0.6;
        }

        .dropdown-link {
            display: block;
            text-decoration: none;
            color: var(--color-text);
            font-family: var(--font-regular);
            margin-bottom: 8px;
            font-size: 18px;
        }

        .dropdown-link:hover {
            color: var(--override-accent-color);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            height: 60vh;
            background: linear-gradient(180deg, #ffffff, #e8e4f5, #beb4e6, #e8e4f5, #ffffff);
            background-size: 100% 400%;
            animation: ombreUpDown 8s ease-in-out infinite;
            will-change: background-position;
            display: flex;
            align-items: flex-start;
            padding: 80px var(--gutter);
            position: relative;
            overflow: hidden;
        }

        @keyframes ombreUpDown {
            0% { background-position: 50% 0%; }
            50% { background-position: 50% 100%; }
            100% { background-position: 50% 0%; }
        }

        .hero-content h1 {
            font-family: var(--font-bold);
            font-weight: 700;
            font-size: 32px;
            max-width: 100%;
            margin: 0;
            position: relative;
            z-index: 20;
            letter-spacing: -0.02em;
        }

        footer {
            padding: 40px var(--gutter);
            border-top: 1px solid #eee;
            background-color: #fff;
            text-align: center;
        }

        .copyright {
            font-family: var(--font-regular);
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Hamburger Animation */
        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -7px); }

        /* --- ADDED DESKTOP MEDIA QUERY --- */
        @media (min-width: 1024px) {
            .nav-menu {
                padding-top: 0;
                justify-content: center;
                gap: 5vh;
            }

            .nav-link {
                font-size: 42px;
                display: inline-block;
                position: relative;
                margin-bottom: 0;
            }

            .nav-link::after {
                content: '';
                position: absolute;
                width: 0;
                height: 3px;
                bottom: -5px;
                left: 50%;
                background-color: var(--color-purple);
                transition: all 0.3s ease-in-out;
                transform: translateX(-50%);
            }

            .nav-link:hover {
                color: var(--color-purple);
            }

            .nav-link:hover::after {
                width: 80%;
            }

            .nav-link.active::after {
                width: 80%;
                background-color: var(--color-purple);
                opacity: 1;
            }
        }

        /* BUBBLE STYLES */
        #bubble-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            user-select: none;
            box-shadow: 0 10px 30px rgba(101, 93, 198, 0.2);
            transition: transform 0.2s ease;
        }

        .bubble.main {
            background: var(--override-accent-color);
            color: white;
            font-family: var(--font-bold);
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            border: 2px solid #fff;
            z-index: 35;
            cursor: pointer;
            pointer-events: auto;
        }

        .bubble.secondary {
            background: rgba(101, 93, 198, 0.6); 
            color: white;
            font-family: var(--font-medium);
            font-weight: 500;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            z-index: 30;
            cursor: default;
            pointer-events: auto;
        }

        .bubble.deco {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(101, 93, 198, 0.2);
            backdrop-filter: blur(2px);
            z-index: 5;
            pointer-events: none;
        }

        .bubble.main:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html">MATHSCIONLINE</a>
        </div>
        
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="apbio.html" class="nav-link">Ap Biology</a>
            </li>
            <li class="nav-item">
                <a href="honorsbio.html" class="nav-link">Honors Biology</a>
            </li>
            <li class="nav-item">
                <a href="about.html" class="nav-link">About Me</a>
            </li>
            <li class="nav-item">
                <a href="contact.html" class="nav-link active">Contact</a>
            </li>
            <li class="nav-item">
                <a href="testimonials.html" class="nav-link">Testimonials</a>
            </li>
            <li class="nav-item">
                <a href="regis.html" class="nav-link">Registration</a>
            </li>
        </ul>
    </nav>

    <section class="hero">
        <div id="bubble-container"></div>
        <div class="hero-content">
            <h1>Contact.</h1>
        </div>
    </section>

    <footer>
        <div class="copyright">
            &copy; 2026 MATHSCIONLINE. All Rights Reserved.
        </div>
    </footer>

    <script>
        // ORIGINAL NAV SCRIPT
        const menuToggle = document.getElementById('mobile-menu');
        const navMenu = document.querySelector('.nav-menu');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navMenu.classList.toggle('active');
            
            if (navMenu.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        });

        // BUBBLE PHYSICS SCRIPT
        const container = document.getElementById('bubble-container');
        const bubbles = [];
        const numDecoyBubbles = 15;
        
        class Bubble {
            constructor(type) {
                this.type = type;
                
                if (type === 'main') {
                    this.size = 130;
                } else if (type === 'secondary') {
                    this.size = 110;
                } else {
                    this.size = Math.random() * 50 + 20;
                }

                this.x = Math.random() * (window.innerWidth - this.size);
                this.y = Math.random() * (container.offsetHeight - this.size);
                
                this.vx = (Math.random() - 0.5) * (type === 'deco' ? 1.5 : 3);
                this.vy = (Math.random() - 0.5) * (type === 'deco' ? 1.5 : 3);
                
                this.element = document.createElement('div');
                this.element.className = `bubble ${type}`;
                
                if (type === 'main') {
                    this.element.innerHTML = "MESSAGE<br>ME";
                    this.element.onclick = () => window.location.href = "mailto:ivonneh@mathsci.online.org";
                } else if (type === 'secondary') {
                    this.element.innerHTML = "HAVE<br>QUESTIONS?";
                }
                
                this.element.style.width = `${this.size}px`;
                this.element.style.height = `${this.size}px`;
                container.appendChild(this.element);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x <= 0) { this.x = 0; this.vx *= -1; }
                if (this.x + this.size >= window.innerWidth) { this.x = window.innerWidth - this.size; this.vx *= -1; }
                if (this.y <= 0) { this.y = 0; this.vy *= -1; }
                if (this.y + this.size >= container.offsetHeight) { this.y = container.offsetHeight - this.size; this.vy *= -1; }

                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;
            }
        }

        bubbles.push(new Bubble('main'));
        bubbles.push(new Bubble('secondary'));

        for (let i = 0; i < numDecoyBubbles; i++) {
            bubbles.push(new Bubble('deco'));
        }

        function animate() {
            bubbles.forEach(b => b.update());
            requestAnimationFrame(animate);
        }

        animate();
    </script>

</body>
</html>
